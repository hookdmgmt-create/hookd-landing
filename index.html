  <style>
    :root {
      --ink: #0f0a07;
      --cream: #f7f2ea;
      --terra: #a8421f;
      --terra-bright: #c4532e;
      --terra-dim: #7a3018;
      --gold: #c8972a;
      --gold-pale: #e8d4a0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--ink);
      color: var(--cream);
      min-height: 100vh;
      overflow-x: hidden;
      cursor: none;
    }

    /* CURSOR */
    .cursor {
      position: fixed;
      width: 8px;
      height: 8px;
      background: var(--terra);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
    }
    .cursor-ring {
      position: fixed;
      width: 36px;
      height: 36px;
      border: 1px solid rgba(168,66,31,0.5);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: width 0.3s, height 0.3s, border-color 0.3s;
    }
    .cursor-ring.expanded {
      width: 56px;
      height: 56px;
      border-color: rgba(168,66,31,0.9);
    }

    /* GRAIN */
    .grain {
      position: fixed;
      inset: -50%;
      width: 200%;
      height: 200%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
      z-index: 100;
      animation: grainAnim 0.5s steps(2) infinite;
    }
    @keyframes grainAnim {
      0%   { transform: translate(0,0); }
      25%  { transform: translate(-2%,-3%); }
      50%  { transform: translate(3%,1%); }
      75%  { transform: translate(-1%,4%); }
      100% { transform: translate(2%,-2%); }
    }

    /* AMBIENT LIGHT */
    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      background:
        radial-gradient(ellipse 80% 60% at 15% 10%, rgba(168,66,31,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 85%, rgba(200,151,42,0.07) 0%, transparent 55%);
    }

    /* LAYOUT */
    .site {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 40px;
    }

    /* LEFT */
    .left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 60px 80px 0;
      border-right: 1px solid rgba(247,242,234,0.06);
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
    }

    .brand-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 48px;
      opacity: 0;
      animation: reveal 0.8s 0.1s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .brand-tag-line { width: 24px; height: 1px; background: var(--terra); }
    .brand-tag-text {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--terra);
    }

    .logo-area {
      margin-bottom: 32px;
      opacity: 0;
      animation: reveal 0.9s 0.2s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .logo-hookd {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(4rem, 6.5vw, 6rem);
      font-weight: 700;
      line-height: 0.92;
      letter-spacing: -0.02em;
      color: var(--cream);
      display: block;
    }
    .logo-hookd .accent { color: var(--terra); }
    .logo-creative {
      font-family: 'Syne', sans-serif;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: rgba(247,242,234,0.3);
      display: block;
      margin-top: 10px;
      padding-left: 3px;
    }

    .headline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(1.3rem, 2vw, 1.75rem);
      font-weight: 300;
      line-height: 1.45;
      color: rgba(247,242,234,0.65);
      margin-bottom: 32px;
      opacity: 0;
      animation: reveal 0.9s 0.3s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .headline em { font-style: italic; color: var(--cream); font-weight: 600; }

    .social-proof {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 36px;
      opacity: 0;
      animation: reveal 0.9s 0.4s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .avatar-stack { display: flex; }
    .avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 2px solid var(--ink);
      margin-left: -8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.58rem; font-weight: 700;
    }
    .avatar:first-child { margin-left: 0; }
    .av1 { background: var(--terra); color: var(--cream); }
    .av2 { background: var(--gold); color: var(--ink); }
    .av3 { background: #5a7a6a; color: var(--cream); }
    .av4 { background: #4a5a8a; color: var(--cream); }

    .proof-text { font-size: 0.76rem; color: rgba(247,242,234,0.45); line-height: 1.4; }
    .proof-text strong { color: var(--cream); font-weight: 700; }

    .perks {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 13px;
      opacity: 0;
      animation: reveal 0.9s 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .perks li {
      display: flex; align-items: flex-start; gap: 14px;
      font-size: 0.8rem; font-weight: 400;
      color: rgba(247,242,234,0.5); line-height: 1.5;
    }
